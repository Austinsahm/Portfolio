<nav class="bg-white absolute bottom-0 w-full text-black shadow-lg">
  <div class="mx-auto max-w-7xl px-8">
    <div class="relative flex h-14 max-h-14 items-center">
      <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
        <!-- Mobile menu button-->
        <button
          type="button"
          class="inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-gray-700 hover:text-white focus:outline-none focus:ring-2 focus:ring-inset focus:ring-white"
          aria-controls="mobile-menu"
          aria-expanded="false"
          (click)="isOpen = !isOpen"
        >
          <span class="sr-only">Open main menu</span>
          <!--
            Icon when menu is closed.

            Heroicon name: outline/bars-3

            Menu open: "hidden", Menu closed: "block"
          -->
          <svg
            class="block h-6 w-6"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
            />
          </svg>
          <!--
            Icon when menu is open.

            Heroicon name: outline/x-mark

            Menu open: "block", Menu closed: "hidden"
          -->
          <svg
            class="hidden h-6 w-6"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
      <div
        class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start"
      >
        <div class="flex flex-shrink-0 items-center">
          <img
            class="block h-8 w-auto lg:hidden"
            src="https://tailwindui.com/img/logos/mark.svg?color=indigo&shade=500"
            alt="Your Company"
          />
          <img
            class="hidden h-8 w-auto lg:block"
            src="https://tailwindui.com/img/logos/mark.svg?color=indigo&shade=500"
            alt="Your Company"
          />
        </div>
        <div class="hidden sm:ml-6 sm:block">
          <div class="flex space-x-4">
            <!-- Current: "bg-gray-900 text-white", Default: "text-gray-300 hover:bg-gray-700 hover:text-white" -->
            <button
              class="bg-blue-700 text-white px-3 py-2 rounded-md text-sm font-medium"
              aria-current="page"
              data-mdb-ripple="true"
              data-mdb-ripple-color="light"
              >Home</button
            >

            <button
              class="hover:bg-blue-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium"
              data-mdb-ripple="true"
              data-mdb-ripple-color="light"
              >About</button
            >

            <button
              class=" hover:bg-blue-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium"
              data-mdb-ripple="true"
              data-mdb-ripple-color="light"
              >Resume</button
            >

            <button
              class=" hover:bg-blue-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium"
              data-mdb-ripple="true"
              data-mdb-ripple-color="light"
              >Contact</button
            >
          </div>
        </div>
      </div>
      <div
      class="relative hidden lg:block p-2 max-w-sm bg-white w-40 h-40 flex justify-self-center justify-center rounded-full border shadow-lg"
    >
      <div
        class="relative inset-y-0 flex justify-center items-center w-full h-full rounded-full"
      >
        <div class="relative flex justify-self-center">
          <div>
            <!-- <span class="sr-only">Open user menu</span> -->
            <img
              class="h-full w-full rounded-full"
              src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
              alt=""
            />
          </div>
        </div>
      </div>
    </div>

    </div>
  </div>

  <!-- Mobile menu, show/hide based on menu state. -->
  <div *ngIf="isOpen" class="sm:hidden" id="mobile-menu">
    <div class="space-y-1 px-2 pt-2 pb-3">
      <!-- Current: "bg-gray-900 text-white", Default: "text-gray-300 hover:bg-gray-700 hover:text-white" -->
      <button
        class="bg-blue-700 text-white w-full block px-3 py-2 rounded-md text-base font-medium"
        aria-current="page"
        data-mdb-ripple="true"
        data-mdb-ripple-color="light"
        >Home</button
      >

      <button
        class="hover:bg-blue-700 w-full hover:text-white block px-3 py-2 rounded-md text-base font-medium"
        data-mdb-ripple="true"
        data-mdb-ripple-color="light"
        >About</button
      >

      <button
        class="hover:bg-blue-700 w-full hover:text-white block px-3 py-2 rounded-md text-base font-medium"
        data-mdb-ripple="true"
        data-mdb-ripple-color="light"
        >Resume</button
      >

      <button
        class="hover:bg-blue-700 w-full hover:text-white block px-3 py-2 rounded-md text-base font-medium"
        data-mdb-ripple="true"
        data-mdb-ripple-color="light"
        >Contact</button
      >
    </div>
  </div>
</nav>
